<style>

  .info-table { width: 100%; border-collapse: collapse; margin-bottom: 12px; font-size: 13px; } .info-table th { text-align: left; padding: 8px 10px; color: #64748b; font-weight: bold; width: 40%; vertical-align: top; border-bottom: 1px solid #f1f5f9; } .info-table td { padding: 8px 10px; font-weight: 500; color: #0f172a; vertical-align: top; border-bottom: 1px solid #f1f5f9; }

  /* ---------------------------------------------------

  .stat-card-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 25px; }

  .dash-box h3 { margin: 0 0 20px 0; font-size: 18px; color: #1e293b; border-bottom: 2px solid rgba(226, 232, 240, 0.6); padding-bottom: 12px; display: flex; align-items: center; gap: 10px;}
  
  .urgent-list { list-style: none; padding: 0; margin: 0; max-height: 350px; overflow-y: auto; padding-right: 5px;}

  .urgent-list li span { font-weight: bold; color: #991b1b; background: #fee2e2; padding: 4px 10px; border-radius: 20px; font-size: 13px; }

  /* 🖨️ CSS สำหรับการสั่งพิมพ์ (Print Mode) */
  @media print {
    body * { visibility: hidden; }
    #dashboardModal, #dashboardModal * { visibility: visible; }
    #dashboardModal { position: absolute; left: 0; top: 0; width: 100vw; height: auto; background: white; align-items: flex-start;}
    .modal-content { box-shadow: none; background: white; max-height: none; overflow: visible; border: none; padding: 0; width: 100%;}
    /* ซ่อนปุ่มที่ไม่จำเป็นตอนปริ้นท์ */
    .close-modal-btn, .dash-tabs, .btn-print { display: none !important; }
    /* แสดงข้อมูลทุกแท็บเรียงต่อกันตอนปริ้นท์ */
    .dash-tab-content { display: block !important; opacity: 1 !important; page-break-inside: avoid; margin-bottom: 30px;}
    .stat-card { color: black !important; background: transparent !important; border: 2px solid #ccc; box-shadow: none;}
    .stat-card::after { display: none; }
    .stat-card h4 { color: #666; }

  }

  /* Form & PIN Modals */

  .form-row { display: flex; gap: 15px; } .btn-submit { background: #3b82f6; color: white; border: none; padding: 14px; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; font-family: 'Sarabun'; width: 100%; transition: 0.3s; box-shadow: 0 4px 15px rgba(59,130,246,0.3);} .btn-submit:hover { background: #2563eb; transform: translateY(-2px); }
  
  .pin-modal-content { background: white; padding: 35px; border-radius: 20px; width: 350px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3); position: relative; } .pin-modal-content h3 { margin-top: 0; color: #0f172a; font-size: 20px; } .pin-input { width: 100%; padding: 15px; font-size: 28px; text-align: center; letter-spacing: 12px; border: 2px solid #cbd5e1; border-radius: 12px; margin: 20px 0; box-sizing: border-box; outline: none; font-family: monospace; background: #f8fafc; } .pin-input:focus { border-color: #3b82f6; background: white; } .pin-submit { background: #3b82f6; color: white; border: none; padding: 14px; width: 100%; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; font-family: 'Sarabun'; transition: 0.3s; box-shadow: 0 4px 15px rgba(59,130,246,0.3);} .pin-submit:hover { background: #2563eb; transform: translateY(-2px); } .pin-error { color: #ef4444; font-size: 13px; margin-top: -5px; margin-bottom: 15px; display: none; font-weight: bold; }
